<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="auth.js?v=1"></script>
  <meta name="card-title" content="Analytics">
  <meta name="card-description" content="Recorder utilization and decode rate trends">
  <meta name="card-order" content="8">
  <title>Analytics — tr-engine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&family=Outfit:wght@200;300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Karla:wght@200;300;400;500&family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">

  <script src="theme-config.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: var(--font-weight-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.5s, color 0.4s;
      -webkit-font-smoothing: antialiased;
    }

    .analytics-wrap {
      flex: 1;
      padding: 80px 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .controls label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .controls select {
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      border-radius: var(--radius-xs);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .controls select:focus { border-color: var(--accent); }

    .control-group { display: flex; align-items: center; gap: 6px; }

    .section { margin-bottom: 32px; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: var(--font-weight-display);
      font-size: 18px;
      color: var(--text);
    }

    .section-subtitle {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .chart-container {
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      border-radius: var(--radius-sm);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .chart-container + .chart-container { margin-top: 16px; }

    canvas { width: 100% !important; height: 280px !important; display: block; }

    .chart-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 280px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .chart-loading::after {
      content: '';
      width: 12px; height: 12px;
      border: 2px solid var(--tile-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin-left: 10px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .chart-error {
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 20px;
      text-align: center;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--tile-border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .summary-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }

    .summary-card {
      flex: 1;
      min-width: 140px;
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      border-radius: var(--radius-xs);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .summary-label {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .summary-value {
      font-family: var(--font-display);
      font-weight: var(--font-weight-display);
      font-size: 22px;
      color: var(--text);
    }

    .summary-unit { font-size: 12px; font-weight: 400; color: var(--text-muted); }

    .device-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 768px) {
      .analytics-wrap { padding: 70px 12px 24px; }
      canvas { height: 200px !important; }
      .summary-card { min-width: 100px; }
      .summary-value { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="analytics-wrap">
  <div class="controls">
    <div class="control-group">
      <label for="ctl-bucket">Bucket</label>
      <select id="ctl-bucket">
        <option value="hour" selected>Hourly</option>
        <option value="day">Daily</option>
      </select>
    </div>
    <div class="control-group">
      <label for="ctl-days">Days</label>
      <select id="ctl-days">
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="7" selected>7</option>
        <option value="14">14</option>
        <option value="30">30</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Recorder Utilization</span>
      <span class="section-subtitle">% time in each state per SDR device</span>
    </div>
    <div class="summary-row" id="recorder-summary"></div>
    <div id="recorder-chart-wrap">
      <div class="chart-container"><div class="chart-loading">loading</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Decode Rates</span>
      <span class="section-subtitle">control channel decode % per system</span>
    </div>
    <div class="summary-row" id="decode-summary"></div>
    <div id="decode-chart-wrap">
      <div class="chart-container"><div class="chart-loading">loading</div></div>
    </div>
  </div>
</div>

<script src="theme-engine.js?v=2"></script>
<script>
(function() {
  'use strict';

  var COLORS = {
    recording: { fill: 'rgba(239, 68, 68, 0.6)',  stroke: '#ef4444' },
    idle:      { fill: 'rgba(251, 191, 36, 0.5)',  stroke: '#fbbf24' },
    available: { fill: 'rgba(52, 211, 153, 0.45)', stroke: '#34d399' },
    ignore:    { fill: 'rgba(148, 163, 184, 0.3)', stroke: '#94a3b8' },
  };

  var RATE_COLORS = [
    { stroke: '#6366f1', band: 'rgba(99, 102, 241, 0.08)' },
    { stroke: '#e879f9', band: 'rgba(232, 121, 249, 0.08)' },
    { stroke: '#38bdf8', band: 'rgba(56, 189, 248, 0.08)' },
    { stroke: '#fbbf24', band: 'rgba(251, 191, 36, 0.08)' },
  ];

  var ctlBucket = document.getElementById('ctl-bucket');
  var ctlDays = document.getElementById('ctl-days');

  function apiFetch(path) {
    return fetch('/api/v1' + path).then(function(r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    });
  }

  function queryStr() {
    return '?bucket=' + ctlBucket.value + '&days=' + ctlDays.value;
  }

  function getCtx(canvas) {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return { ctx: ctx, w: rect.width, h: rect.height };
  }

  function fmtTime(iso, bucket) {
    var d = new Date(iso);
    if (bucket === 'day') return (d.getMonth()+1) + '/' + d.getDate();
    var h = d.getHours();
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' + (h < 10 ? '0' : '') + h + ':00';
  }

  function fmtTimeFull(iso) { return new Date(iso).toLocaleString(); }

  function cv(name) {
    return getComputedStyle(document.body).getPropertyValue('--' + name).trim();
  }

  // ── DOM helpers (no innerHTML with data) ──
  function clearEl(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  function makeLoading() {
    var wrap = document.createElement('div');
    wrap.className = 'chart-container';
    var inner = document.createElement('div');
    inner.className = 'chart-loading';
    inner.textContent = 'loading';
    wrap.appendChild(inner);
    return wrap;
  }

  function makeError(msg) {
    var wrap = document.createElement('div');
    wrap.className = 'chart-container';
    var inner = document.createElement('div');
    inner.className = 'chart-error';
    inner.textContent = 'Failed: ' + msg;
    wrap.appendChild(inner);
    return wrap;
  }

  function makeSummaryCard(label, value, unit) {
    var card = document.createElement('div');
    card.className = 'summary-card';
    var lbl = document.createElement('span');
    lbl.className = 'summary-label';
    lbl.textContent = label;
    card.appendChild(lbl);
    var val = document.createElement('span');
    val.className = 'summary-value';
    val.textContent = value;
    if (unit) {
      var u = document.createElement('span');
      u.className = 'summary-unit';
      u.textContent = ' ' + unit;
      val.appendChild(u);
    }
    card.appendChild(val);
    return card;
  }

  function makeLegendItem(label, color) {
    var el = document.createElement('span');
    el.className = 'legend-item';
    var dot = document.createElement('span');
    dot.className = 'legend-dot';
    dot.style.background = color;
    el.appendChild(dot);
    el.appendChild(document.createTextNode(label));
    return el;
  }

  // ── Stacked area chart (recorder utilization) ──
  function drawStackedArea(container, buckets, bucket) {
    clearEl(container);
    if (!buckets.length) {
      container.appendChild(makeError('No data for this time range.'));
      return;
    }

    var devices = {};
    buckets.forEach(function(b) {
      if (!devices[b.src_num]) devices[b.src_num] = [];
      devices[b.src_num].push(b);
    });

    Object.keys(devices).map(Number).sort(function(a,b){return a-b;}).forEach(function(srcNum) {
      var data = devices[srcNum];

      var label = document.createElement('div');
      label.className = 'device-label';
      label.textContent = 'SDR ' + srcNum + '  \u2014  ' + data.length + ' buckets';
      container.appendChild(label);

      var wrap = document.createElement('div');
      wrap.className = 'chart-container';
      container.appendChild(wrap);

      var canvas = document.createElement('canvas');
      wrap.appendChild(canvas);

      var r = getCtx(canvas);
      var ctx = r.ctx, w = r.w, h = r.h;
      var pad = { top: 16, right: 12, bottom: 36, left: 44 };
      var cw = w - pad.left - pad.right;
      var ch = h - pad.top - pad.bottom;

      var layers = ['pct_ignore', 'pct_idle', 'pct_available', 'pct_recording'];
      var layerColors = [COLORS.ignore, COLORS.idle, COLORS.available, COLORS.recording];

      var stacked = data.map(function(d) {
        var sum = 0;
        return layers.map(function(k) { sum += (d[k] || 0); return sum; });
      });

      function xPos(i) { return pad.left + (i / Math.max(data.length - 1, 1)) * cw; }
      function yPos(v) { return pad.top + (1 - v / 100) * ch; }

      ctx.strokeStyle = cv('tile-border') || 'rgba(128,128,128,0.15)';
      ctx.lineWidth = 0.5;
      for (var g = 0; g <= 4; g++) {
        var gy = yPos(g * 25);
        ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(w - pad.right, gy); ctx.stroke();
      }

      for (var layer = layers.length - 1; layer >= 0; layer--) {
        ctx.beginPath();
        ctx.moveTo(xPos(0), yPos(stacked[0][layer]));
        for (var i = 1; i < data.length; i++) ctx.lineTo(xPos(i), yPos(stacked[i][layer]));
        if (layer > 0) {
          for (var i = data.length - 1; i >= 0; i--) ctx.lineTo(xPos(i), yPos(stacked[i][layer - 1]));
        } else {
          ctx.lineTo(xPos(data.length - 1), yPos(0));
          ctx.lineTo(xPos(0), yPos(0));
        }
        ctx.closePath();
        ctx.fillStyle = layerColors[layer].fill;
        ctx.fill();
      }

      for (var layer = 0; layer < layers.length; layer++) {
        ctx.beginPath();
        ctx.moveTo(xPos(0), yPos(stacked[0][layer]));
        for (var i = 1; i < data.length; i++) ctx.lineTo(xPos(i), yPos(stacked[i][layer]));
        ctx.strokeStyle = layerColors[layer].stroke;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      ctx.fillStyle = cv('text-muted') || '#888';
      ctx.font = '10px ' + (cv('font-mono') || 'monospace');
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (var g = 0; g <= 4; g++) ctx.fillText(g * 25 + '%', pad.left - 6, yPos(g * 25));

      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      var step = Math.max(1, Math.floor(data.length / 8));
      for (var i = 0; i < data.length; i += step) {
        ctx.fillText(fmtTime(data[i].time, bucket), xPos(i), h - pad.bottom + 8);
      }

      var legend = document.createElement('div');
      legend.className = 'legend';
      legend.appendChild(makeLegendItem('Recording', COLORS.recording.stroke));
      legend.appendChild(makeLegendItem('Available', COLORS.available.stroke));
      legend.appendChild(makeLegendItem('Idle', COLORS.idle.stroke));
      legend.appendChild(makeLegendItem('Ignore', COLORS.ignore.stroke));
      wrap.appendChild(legend);

      canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var idx = Math.round(((mx - pad.left) / cw) * (data.length - 1));
        idx = Math.max(0, Math.min(data.length - 1, idx));
        var d = data[idx];
        canvas.title = fmtTimeFull(d.time) +
          '\nRecording: ' + d.pct_recording + '%' +
          '\nAvailable: ' + d.pct_available + '%' +
          '\nIdle: ' + d.pct_idle + '%' +
          '\nIgnore: ' + d.pct_ignore + '%' +
          '\nSamples: ' + d.sample_count;
      });
    });
  }

  // ── Decode rate chart (line + min/max band) ──
  function drawDecodeRates(container, buckets, bucket) {
    clearEl(container);
    if (!buckets.length) {
      container.appendChild(makeError('No data for this time range.'));
      return;
    }

    var systems = {};
    buckets.forEach(function(b) {
      if (!systems[b.system_id]) systems[b.system_id] = { name: b.system_name, data: [] };
      systems[b.system_id].data.push(b);
    });
    var sysKeys = Object.keys(systems).map(Number).sort(function(a,b){return a-b;});

    var allTimes = [], timeSet = {};
    buckets.forEach(function(b) {
      if (!timeSet[b.time]) { allTimes.push(b.time); timeSet[b.time] = true; }
    });
    allTimes.sort();

    var wrap = document.createElement('div');
    wrap.className = 'chart-container';
    container.appendChild(wrap);

    var canvas = document.createElement('canvas');
    wrap.appendChild(canvas);

    var r = getCtx(canvas);
    var ctx = r.ctx, w = r.w, h = r.h;
    var pad = { top: 16, right: 12, bottom: 36, left: 44 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;

    var minVal = Infinity, maxVal = -Infinity;
    buckets.forEach(function(b) {
      if (b.min_rate < minVal) minVal = b.min_rate;
      if (b.max_rate > maxVal) maxVal = b.max_rate;
    });
    if (minVal === Infinity) { minVal = 0; maxVal = 100; }
    var yPad = (maxVal - minVal) * 0.1 || 5;
    minVal = Math.max(0, minVal - yPad);
    maxVal = maxVal + yPad;

    function xPos(i) { return pad.left + (i / Math.max(allTimes.length - 1, 1)) * cw; }
    function yPos(v) { return pad.top + (1 - (v - minVal) / (maxVal - minVal)) * ch; }

    ctx.strokeStyle = cv('tile-border') || 'rgba(128,128,128,0.15)';
    ctx.lineWidth = 0.5;
    var gridSteps = 5;
    for (var g = 0; g <= gridSteps; g++) {
      var gv = minVal + (maxVal - minVal) * (g / gridSteps);
      ctx.beginPath(); ctx.moveTo(pad.left, yPos(gv)); ctx.lineTo(w - pad.right, yPos(gv)); ctx.stroke();
    }

    sysKeys.forEach(function(sysId, sysIdx) {
      var sys = systems[sysId];
      var color = RATE_COLORS[sysIdx % RATE_COLORS.length];
      var timeMap = {};
      sys.data.forEach(function(d) { timeMap[d.time] = d; });

      ctx.beginPath();
      var started = false;
      for (var i = 0; i < allTimes.length; i++) {
        var d = timeMap[allTimes[i]]; if (!d) continue;
        if (!started) { ctx.moveTo(xPos(i), yPos(d.max_rate)); started = true; }
        else ctx.lineTo(xPos(i), yPos(d.max_rate));
      }
      for (var i = allTimes.length - 1; i >= 0; i--) {
        var d = timeMap[allTimes[i]]; if (!d) continue;
        ctx.lineTo(xPos(i), yPos(d.min_rate));
      }
      ctx.closePath();
      ctx.fillStyle = color.band;
      ctx.fill();

      ctx.beginPath();
      started = false;
      for (var i = 0; i < allTimes.length; i++) {
        var d = timeMap[allTimes[i]]; if (!d) continue;
        if (!started) { ctx.moveTo(xPos(i), yPos(d.avg_rate)); started = true; }
        else ctx.lineTo(xPos(i), yPos(d.avg_rate));
      }
      ctx.strokeStyle = color.stroke;
      ctx.lineWidth = 2;
      ctx.stroke();
    });

    ctx.fillStyle = cv('text-muted') || '#888';
    ctx.font = '10px ' + (cv('font-mono') || 'monospace');
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (var g = 0; g <= gridSteps; g++) {
      var gv = minVal + (maxVal - minVal) * (g / gridSteps);
      ctx.fillText(gv.toFixed(0), pad.left - 6, yPos(gv));
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    var step = Math.max(1, Math.floor(allTimes.length / 8));
    for (var i = 0; i < allTimes.length; i += step) {
      ctx.fillText(fmtTime(allTimes[i], bucket), xPos(i), h - pad.bottom + 8);
    }

    var legend = document.createElement('div');
    legend.className = 'legend';
    sysKeys.forEach(function(sysId, sysIdx) {
      var color = RATE_COLORS[sysIdx % RATE_COLORS.length];
      legend.appendChild(makeLegendItem(systems[sysId].name + ' (avg \u00b1 min/max)', color.stroke));
    });
    wrap.appendChild(legend);

    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      var mx = e.clientX - rect.left;
      var idx = Math.round(((mx - pad.left) / cw) * (allTimes.length - 1));
      idx = Math.max(0, Math.min(allTimes.length - 1, idx));
      var t = allTimes[idx];
      var lines = [fmtTimeFull(t)];
      sysKeys.forEach(function(sysId) {
        var d = null;
        systems[sysId].data.forEach(function(b) { if (b.time === t) d = b; });
        if (d) lines.push(systems[sysId].name + ': avg=' + d.avg_rate + ' min=' + d.min_rate + ' max=' + d.max_rate);
      });
      canvas.title = lines.join('\n');
    });
  }

  // ── Summary cards ──
  function renderRecorderSummary(buckets) {
    var el = document.getElementById('recorder-summary');
    clearEl(el);
    if (!buckets.length) return;

    var total = 0, sumRec = 0, sumAvail = 0, sumIdle = 0;
    buckets.forEach(function(b) {
      total += b.sample_count;
      sumRec += b.pct_recording * b.sample_count;
      sumAvail += b.pct_available * b.sample_count;
      sumIdle += b.pct_idle * b.sample_count;
    });

    var devices = {};
    buckets.forEach(function(b) { devices[b.src_num] = true; });

    el.appendChild(makeSummaryCard('Avg Recording', (sumRec / total).toFixed(1), '%'));
    el.appendChild(makeSummaryCard('Avg Available', (sumAvail / total).toFixed(1), '%'));
    el.appendChild(makeSummaryCard('Avg Idle', (sumIdle / total).toFixed(1), '%'));
    el.appendChild(makeSummaryCard('SDR Devices', String(Object.keys(devices).length), ''));
    el.appendChild(makeSummaryCard('Snapshots', total.toLocaleString(), ''));
  }

  function renderDecodeSummary(buckets) {
    var el = document.getElementById('decode-summary');
    clearEl(el);
    if (!buckets.length) return;

    var total = 0, sumRate = 0, gMin = Infinity, gMax = -Infinity;
    buckets.forEach(function(b) {
      total += b.sample_count;
      sumRate += b.avg_rate * b.sample_count;
      if (b.min_rate < gMin) gMin = b.min_rate;
      if (b.max_rate > gMax) gMax = b.max_rate;
    });

    var systems = {};
    buckets.forEach(function(b) { systems[b.system_id] = b.system_name; });

    el.appendChild(makeSummaryCard('Avg Rate', (sumRate / total).toFixed(1), ''));
    el.appendChild(makeSummaryCard('Min', gMin.toFixed(1), ''));
    el.appendChild(makeSummaryCard('Max', gMax.toFixed(1), ''));
    el.appendChild(makeSummaryCard('Systems', String(Object.keys(systems).length), ''));
    el.appendChild(makeSummaryCard('Samples', total.toLocaleString(), ''));
  }

  // ── Load ──
  function loadAll() {
    var q = queryStr();
    var b = ctlBucket.value;

    var recWrap = document.getElementById('recorder-chart-wrap');
    var decWrap = document.getElementById('decode-chart-wrap');
    clearEl(recWrap); recWrap.appendChild(makeLoading());
    clearEl(decWrap); decWrap.appendChild(makeLoading());

    apiFetch('/analytics/recorder-utilization' + q).then(function(data) {
      renderRecorderSummary(data.buckets);
      drawStackedArea(recWrap, data.buckets, b);
    }).catch(function(err) {
      clearEl(recWrap); recWrap.appendChild(makeError(err.message));
    });

    apiFetch('/analytics/decode-rates' + q).then(function(data) {
      renderDecodeSummary(data.buckets);
      drawDecodeRates(decWrap, data.buckets, b);
    }).catch(function(err) {
      clearEl(decWrap); decWrap.appendChild(makeError(err.message));
    });
  }

  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(loadAll, 250);
  });

  ctlBucket.addEventListener('change', loadAll);
  ctlDays.addEventListener('change', loadAll);

  loadAll();
})();
</script>
</body>
</html>
