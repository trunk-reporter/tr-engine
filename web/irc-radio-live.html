// ══════════════════════════════════════════════════════════════
// AUDIO PLAYER
// ══════════════════════════════════════════════════════════════

const playerBar = document.getElementById('player-bar');
const playerPlayBtn = document.getElementById('player-play');
const playerNickEl = document.getElementById('player-nick');
const playerChanEl = document.getElementById('player-chan');
const playerTimeEl = document.getElementById('player-time');
const playerProgress = document.getElementById('player-progress');
const playerProgressFill = document.getElementById('player-progress-fill');
const playerCloseBtn = document.getElementById('player-close');

const audioEl = new Audio();
audioEl.preload = 'auto';
let currentPlayingMsgEl = null;
let currentCallId = null;
let playerRaf = null;
let playerTxEnd = null; // end position for current transmission segment (seconds), null = play full call

function fmtAudioTime(sec) {
  if (!sec || !isFinite(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

/** Render segment markers on the progress bar from a call's src_list. */
function renderPlayerSegments(callId) {
  // Clear existing segments
  playerProgress.querySelectorAll('.player-segment, .player-segment-divider').forEach(el => el.remove());
  const srcList = callSrcLists.get(callId);
  if (!srcList || srcList.length < 2 || !audioEl.duration) return;

  const dur = audioEl.duration;
  const colors = ['var(--irc-info)', 'var(--irc-success)', 'var(--magenta)', 'var(--yellow)', 'var(--red)', 'var(--blue)'];
  const sorted = [...srcList].sort((a, b) => (a.pos || 0) - (b.pos || 0));

  // Track unique sources for color assignment
  const srcColorMap = new Map();
  let colorIdx = 0;
  for (const tx of sorted) {
    if (!srcColorMap.has(tx.src)) srcColorMap.set(tx.src, colors[colorIdx++ % colors.length]);
  }

  for (let i = 0; i < sorted.length; i++) {
    const tx = sorted[i];
    const startPct = ((tx.pos || 0) / dur) * 100;
    const txDur = tx.duration || (i < sorted.length - 1 ? (sorted[i + 1].pos || 0) - (tx.pos || 0) : dur - (tx.pos || 0));
    const widthPct = (txDur / dur) * 100;

    // Colored segment background
    const seg = document.createElement('div');
    seg.className = 'player-segment';
    seg.style.left = startPct + '%';
    seg.style.width = Math.max(widthPct, 0.5) + '%';
    seg.style.background = srcColorMap.get(tx.src);
    seg.dataset.txIndex = i;
    playerProgress.appendChild(seg);

    // Divider line between segments (skip first)
    if (i > 0 && startPct > 0) {
      const div = document.createElement('div');
      div.className = 'player-segment-divider';
      div.style.left = startPct + '%';
      playerProgress.appendChild(div);
    }
  }
}

/** Highlight the active segment in the progress bar. */
function updateActiveSegment() {
  const t = audioEl.currentTime;
  playerProgress.querySelectorAll('.player-segment').forEach(seg => {
    seg.classList.remove('active');
  });
  const srcList = callSrcLists.get(currentCallId);
  if (!srcList || !audioEl.duration) return;
  const sorted = [...srcList].sort((a, b) => (a.pos || 0) - (b.pos || 0));
  for (let i = sorted.length - 1; i >= 0; i--) {
    if (t >= (sorted[i].pos || 0)) {
      const seg = playerProgress.querySelector(`.player-segment[data-tx-index="${i}"]`);
      if (seg) seg.classList.add('active');
      break;
    }
  }
}

function playCall(callId, nick, channel, msgEl, txPos, txDuration) {
  const hasTxPos = txPos != null && txPos >= 0;
  const txEnd = hasTxPos && txDuration > 0 ? txPos + txDuration : null;

  // Same call — seek to segment or toggle pause
  if (currentCallId === callId && audioEl.src) {
    if (hasTxPos) {
      // Clicking a different transmission in the same call — seek to it
      playerTxEnd = txEnd;
      audioEl.currentTime = txPos;
      // Update highlight
      if (currentPlayingMsgEl) currentPlayingMsgEl.classList.remove('now-playing');
      currentPlayingMsgEl = msgEl;
      if (msgEl) msgEl.classList.add('now-playing');
      playerNickEl.textContent = nick || '?';
      playerNickEl.style.color = nickColor(nick || '');
      if (audioEl.paused) {
        audioEl.play().then(() => {
          playerPlayBtn.textContent = '⏸';
          updatePlayerProgress();
        }).catch(() => { playerPlayBtn.textContent = '▶'; });
      }
      return;
    }
    // No specific transmission — toggle pause
    if (!audioEl.paused) {
      audioEl.pause();
      playerPlayBtn.textContent = '▶';
      return;
    }
    playerTxEnd = null; // resume full playback
    audioEl.play().then(() => {
      playerPlayBtn.textContent = '⏸';
      updatePlayerProgress();
    }).catch(() => { playerPlayBtn.textContent = '▶'; });
    return;
  }

  // New call — load and play
  currentCallId = callId;
  playerTxEnd = txEnd;

  // Clear previous highlight
  if (currentPlayingMsgEl) currentPlayingMsgEl.classList.remove('now-playing');
  currentPlayingMsgEl = msgEl;
  if (msgEl) msgEl.classList.add('now-playing');

  // Update player bar
  playerNickEl.textContent = nick || '?';
  playerNickEl.style.color = nickColor(nick || '');
  playerChanEl.textContent = channel || '';
  playerTimeEl.textContent = '0:00 / --:--';
  playerProgressFill.style.width = '0%';
  playerBar.classList.add('active');
  playerPlayBtn.textContent = '⏳';

  // Clear old segments
  playerProgress.querySelectorAll('.player-segment, .player-segment-divider').forEach(el => el.remove());

  // Load audio — append token for <audio> element (bypasses patched fetch)
  const audioUrl = `${API_BASE}/calls/${callId}/audio`;
  const authToken = window.trAuth && window.trAuth.getToken();
  audioEl.src = authToken ? audioUrl + '?token=' + encodeURIComponent(authToken) : audioUrl;
  audioEl.load();

  // Seek to transmission start once metadata loaded
  const onCanPlay = () => {
    audioEl.removeEventListener('canplay', onCanPlay);
    if (hasTxPos) audioEl.currentTime = txPos;
    renderPlayerSegments(callId);
  };
  audioEl.addEventListener('canplay', onCanPlay);

  audioEl.play().then(() => {
    playerPlayBtn.textContent = '⏸';
    updatePlayerProgress();
  }).catch(err => {
    playerPlayBtn.textContent = '▶';
    playerTimeEl.textContent = err.name === 'NotAllowedError' ? 'click to play' : 'no audio';
    console.warn('Playback error:', err.message);
  });
}

function updatePlayerProgress() {
  if (playerRaf) cancelAnimationFrame(playerRaf);

  function tick() {
    if (!audioEl.paused && audioEl.duration) {
      // Stop at transmission end if set
      if (playerTxEnd != null && audioEl.currentTime >= playerTxEnd) {
        audioEl.pause();
        audioEl.currentTime = playerTxEnd;
        playerPlayBtn.textContent = '▶';
        playerTxEnd = null; // allow manual resume to play full call
        return;
      }
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      playerProgressFill.style.width = pct + '%';
      playerTimeEl.textContent = `${fmtAudioTime(audioEl.currentTime)} / ${fmtAudioTime(audioEl.duration)}`;
      updateActiveSegment();
    }
    if (!audioEl.paused) playerRaf = requestAnimationFrame(tick);
  }
  tick();
}

// Play/pause button
playerPlayBtn.addEventListener('click', () => {
  if (!audioEl.src) return;
  if (audioEl.paused) {
    audioEl.play().then(() => {
      playerPlayBtn.textContent = '⏸';
      updatePlayerProgress();
    }).catch(() => { playerPlayBtn.textContent = '▶'; });
  } else {
    audioEl.pause();
    playerPlayBtn.textContent = '▶';
  }
});

// Close player
playerCloseBtn.addEventListener('click', () => {
  audioEl.pause();
  audioEl.src = '';
  currentCallId = null;
  playerTxEnd = null;
  if (currentPlayingMsgEl) currentPlayingMsgEl.classList.remove('now-playing');
  currentPlayingMsgEl = null;
  playerBar.classList.remove('active');
  playerProgress.querySelectorAll('.player-segment, .player-segment-divider').forEach(el => el.remove());
  if (playerRaf) cancelAnimationFrame(playerRaf);
  // Reset scanner state so queue can resume on next enqueue
  scannerPlaying = false;
  updateScannerQueueUI();
});

// Skip button — advance to next scanner item
document.getElementById('player-skip').addEventListener('click', () => {
  audioEl.pause();
  audioEl.src = '';
  playerPlayBtn.textContent = '\u25B6';
  if (currentPlayingMsgEl) currentPlayingMsgEl.classList.remove('now-playing');
  currentPlayingMsgEl = null;
  currentCallId = null;
  if (scannerEnabled && scannerQueue.length > 0) {
    setTimeout(scannerPlayNext, 300);
  } else {
    scannerPlaying = false;
    updateScannerQueueUI();
  }
});

// Seek on progress bar click
playerProgress.addEventListener('click', (e) => {
  if (!audioEl.duration) return;
  const rect = playerProgress.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
  playerProgressFill.style.width = (pct * 100) + '%';
  playerTxEnd = null; // manual seek clears transmission boundary
});

// Audio ended
audioEl.addEventListener('ended', () => {
  playerPlayBtn.textContent = '▶';
  playerProgressFill.style.width = '100%';
  if (currentPlayingMsgEl) currentPlayingMsgEl.classList.remove('now-playing');
  currentPlayingMsgEl = null;
  currentCallId = null;

  // Scanner: play next in queue
  if (scannerEnabled && scannerQueue.length > 0) {
    setTimeout(scannerPlayNext, 300); // small gap between transmissions
  } else {
    scannerPlaying = false;
    updateScannerQueueUI();
  }
});

// Audio error — skip failed audio so scanner doesn't stall
audioEl.addEventListener('error', () => {
  playerPlayBtn.textContent = '\u25B6';
  if (currentPlayingMsgEl) currentPlayingMsgEl.classList.remove('now-playing');
  currentPlayingMsgEl = null;
  currentCallId = null;
  if (scannerEnabled && scannerQueue.length > 0) {
    setTimeout(scannerPlayNext, 300);
  } else {
    scannerPlaying = false;
    updateScannerQueueUI();
  }
});

// Duration loaded
audioEl.addEventListener('loadedmetadata', () => {
  playerTimeEl.textContent = `0:00 / ${fmtAudioTime(audioEl.duration)}`;
});

const channelTree = document.querySelector('.channel-tree');
const nicklist = document.querySelector('.nicklist');
const drawerBackdrop = document.getElementById('drawer-backdrop');
const hamburgerBtn = document.getElementById('mobile-hamburger');
const usersBtn = document.getElementById('mobile-users-btn');

function openDrawer(which) {
  if (which === 'channels') {
    channelTree.classList.add('open');
    nicklist.classList.remove('open');
  } else {
    nicklist.classList.add('open');
    channelTree.classList.remove('open');
  }
  drawerBackdrop.classList.add('visible');
}

function closeDrawers() {
  channelTree.classList.remove('open');
  nicklist.classList.remove('open');
  drawerBackdrop.classList.remove('visible');
}

hamburgerBtn.addEventListener('click', () => openDrawer('channels'));
usersBtn.addEventListener('click', () => openDrawer('users'));
drawerBackdrop.addEventListener('click', closeDrawers);

// Swipe gestures for mobile drawers
let touchStartX = 0;
let touchStartY = 0;
const SWIPE_THRESHOLD = 50;
const EDGE_ZONE = 30; // pixels from screen edge

document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  // Only trigger on horizontal swipes (not vertical scroll)
  if (Math.abs(dx) < SWIPE_THRESHOLD || Math.abs(dy) > Math.abs(dx)) return;
  if (window.innerWidth > 768) return;

  if (dx > 0 && touchStartX < EDGE_ZONE) {
    // Swipe right from left edge — open channels
    openDrawer('channels');
  } else if (dx < 0 && touchStartX > window.innerWidth - EDGE_ZONE) {
    // Swipe left from right edge — open users
    openDrawer('users');
  } else if (dx < 0 && channelTree.classList.contains('open')) {
    closeDrawers();
  } else if (dx > 0 && nicklist.classList.contains('open')) {
    closeDrawers();
  }
}, { passive: true });


// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════

async function init() {
  initStatusChannel();
  switchChannel(STATUS_CHANNEL);
  renderTree();

  serverMsg(`tr-engine IRC client — Layer 1 (read-only)`);
  serverMsg(`API: ${API_BASE}`);
  serverMsg('');

  // Bootstrap: channels → unit nicks → affiliations → recent calls → SSE
  initResizablePanels();
  window.addEventListener('resize', () => {
    if (isMobileLayout()) return;
    const left = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--channel-tree-width')) || 240;
    const right = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nicklist-width')) || 164;
    applyPanelWidth('--channel-tree-width', Math.max(180, Math.min(left, Math.floor(window.innerWidth * 0.5))));
    applyPanelWidth('--nicklist-width', Math.max(140, Math.min(right, Math.floor(window.innerWidth * 0.4))));
  });
  await bootstrapChannels();
  await bootstrapUnitNicks();
  await bootstrapAffiliations();
  await bootstrapRecentCalls();

  // Connect SSE for live events
  connectSSE();

  // Status bar ticker
  setInterval(updateStatusBar, 1000);
  updateStatusBar();
}

init();
inputField.focus();
</script>
