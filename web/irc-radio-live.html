<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js?v=1"></script>
<title>tr-engine IRC</title>
<meta name="card-title" content="IRC Radio">
<meta name="card-description" content="IRC-style live radio monitor with channels, nicks, and audio playback">
<meta name="card-order" content="0">
<script src="theme-config.js"></script>
<style>
:root {
  --irc-accent: var(--accent);
  --irc-accent-light: var(--accent-light);
  --irc-info: var(--info);
  --irc-warning: var(--warning);
  --irc-success: var(--success);
  --irc-danger: var(--danger);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono), 'Courier New', monospace;
  font-size: 16px;
  line-height: 1.45;
  display: flex;
  flex-direction: column;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.04;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9998;
}
.vignette-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9997;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
}

/* ── Top bar ── */
.titlebar {
  height: 28px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 14px;
  color: var(--text-mid);
  gap: 8px;
  flex-shrink: 0;
  user-select: none;
}
.titlebar .server { color: var(--irc-info); font-weight: 500; }
.titlebar .topic { color: var(--text-muted); margin-left: 8px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.titlebar .lag { color: var(--warning); margin-left: auto; }

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

.panel-resizer {
  width: 6px;
  flex: 0 0 6px;
  cursor: col-resize;
  position: relative;
  background: transparent;
  user-select: none;
  touch-action: none;
}
.panel-resizer::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 2px;
  width: 2px;
  background: var(--border);
  opacity: 0.45;
  transition: opacity 0.15s, background 0.15s;
}
.panel-resizer:hover::before,
.panel-resizer.dragging::before {
  opacity: 1;
  background: var(--irc-info);
}

/* ── Channel tree (left panel) ── */
.channel-tree {
  width: var(--channel-tree-width, 240px);
  flex: 0 0 var(--channel-tree-width, 240px);
  min-width: 180px;
  max-width: 50vw;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
.tree-header-row {
  padding: 4px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.tree-header-text {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}
.read-all-btn {
  background: none;
  border: 1px solid var(--border-hover);
  color: var(--text-mid);
  font-family: inherit;
  font-size: 12px;
  padding: 1px 6px;
  border-radius: 3px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.read-all-btn:hover { color: var(--irc-info); border-color: var(--irc-info); }
.tree-search {
  padding: 3px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.tree-search-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 2px 6px;
  outline: none;
}
.tree-search-input:focus { border-color: var(--irc-info); }
.tree-search-input::placeholder { color: var(--text-faint); }
.tree-search-clear {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  visibility: hidden;
  user-select: none;
}
.tree-search-clear.visible { visibility: visible; }
.tree-more {
  padding: 1px 8px 1px 16px;
  font-size: 12px;
  font-style: italic;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.15s;
}
.tree-more:hover { color: var(--text-mid); }
.tree-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.tree-scroll::-webkit-scrollbar { width: 6px; }
.tree-scroll::-webkit-scrollbar-track { background: transparent; }
.tree-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.tree-section { padding: 2px 0; }
.tree-section-label {
  padding: 1px 8px;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  cursor: pointer;
}
.tree-section-label .nb { white-space: nowrap; }
.tree-section-label:hover { color: var(--text-mid); }
.tree-section-label::before { content: '▾ '; font-size: 10px; }
.tree-section-label.collapsed::before { content: '▸ '; }

.channel-item {
  padding: 1px 8px 1px 16px;
  cursor: pointer;
  color: var(--text-mid);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  overflow: hidden;
}
.channel-item:hover { background: var(--bg-elevated); color: var(--text); }
.channel-item.active { color: var(--text); background: var(--bg-elevated); font-weight: 500; }
.channel-item.has-activity { color: var(--irc-warning); }
.channel-item .chan-prefix { color: var(--text-muted); }
.channel-item .chan-label { overflow: hidden; text-overflow: ellipsis; }
.channel-item .unread {
  margin-left: auto; font-size: 10px; color: var(--bg);
  background: var(--irc-warning); border-radius: 3px;
  padding: 0 3px; min-width: 12px; text-align: center; font-weight: 600;
  flex-shrink: 0;
}
.channel-icons {
  margin-left: auto;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.fav-star {
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  color: var(--text-muted);
  font-size: 11px;
  padding: 0 1px;
  flex-shrink: 0;
}
.channel-item:hover .fav-star,
.fav-star.active { opacity: 1; }
.fav-star.active { color: var(--warning); }
.origin-tag {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.85em;
  margin-right: 4px;
  opacity: 0.7;
}
.origin-tag:hover {
  opacity: 1;
  text-decoration: underline;
}
.group-unread {
  background: var(--irc-warning);
  color: var(--bg);
  font-size: 9px;
  font-weight: 600;
  padding: 0 4px;
  border-radius: 7px;
  margin-left: 4px;
  min-width: 14px;
  text-align: center;
  display: inline-block;
  line-height: 14px;
}
.scan-icon {
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  color: var(--text-muted);
  font-size: 10px;
  flex-shrink: 0;
}
.channel-item:hover .scan-icon,
.scan-icon.active { opacity: 1; }
.scan-icon.active { color: var(--irc-success); }

.scanner-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: inherit;
  font-size: 12px;
  padding: 0 6px;
  cursor: pointer;
  border-radius: 3px;
  margin-left: 4px;
}
.scanner-btn.active {
  color: var(--irc-success);
  border-color: var(--irc-success);
}
.scanner-queue-info {
  color: var(--text-muted);
  font-size: 12px;
  margin-left: 4px;
}

.tree-status {
  padding: 4px 8px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.tree-status .dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
.tree-status .dot.connected { background: var(--success); }
.tree-status .dot.disconnected { background: var(--danger); }
.tree-status .dot.connecting { background: var(--warning); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

/* ── Chat area ── */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.channel-bar {
  height: 32px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
.channel-bar .chan-name { font-weight: 600; font-size: 16px; color: var(--text); }
.channel-bar .chan-topic { font-size: 14px; color: var(--text-mid); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.channel-bar .chan-mode { font-size: 13px; color: var(--text-muted); }
.channel-bar .chan-count { font-size: 13px; color: var(--text-mid); margin-left: auto; white-space: nowrap; }

/* ── Channel name edit ── */
.chan-edit-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 13px; padding: 2px 4px;
  border-radius: 3px; line-height: 1; display: none;
}
.chan-edit-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.chan-edit-row {
  display: flex; align-items: center; gap: 6px;
}
.chan-edit-input {
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 2px 6px;
  border-radius: 3px; outline: none; width: 180px;
  font-family: inherit;
}
.chan-edit-input:focus { border-color: var(--accent, #5865F2); }
.chan-edit-save, .chan-edit-cancel {
  background: none; border: 1px solid var(--border); color: var(--text-mid);
  cursor: pointer; font-size: 12px; padding: 2px 8px;
  border-radius: 3px; line-height: 1;
}
.chan-edit-save:hover { color: var(--text); border-color: var(--text-muted); }
.chan-edit-cancel:hover { color: var(--text); border-color: var(--text-muted); }

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 0;
}
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.messages::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

.msg {
  padding: 1px 14px;
  display: flex;
  gap: 0;
  min-height: 19px;
  align-items: baseline;
}
.msg:hover { background: var(--bg-elevated); }
.msg .ts { color: var(--text-faint); font-size: 14px; min-width: 82px; flex-shrink: 0; user-select: none; }
.date-separator {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  padding: 6px 14px 4px;
  position: relative;
}
.date-separator::before, .date-separator::after {
  content: '';
  position: absolute;
  top: 50%;
  height: 1px;
  background: var(--border);
  width: calc(50% - 80px);
}
.date-separator::before { left: 14px; }
.date-separator::after { right: 14px; }
.msg .nick {
  font-weight: 500; min-width: 130px; max-width: 250px; text-align: right;
  padding-right: 8px; flex-shrink: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.msg .nick::before { content: '<'; color: var(--text-muted); }
.msg .nick::after { content: '>'; color: var(--text-muted); }
.msg .body { flex: 1; word-break: break-word; min-width: 0; }

.msg.system .nick { min-width: 0; max-width: none; padding-right: 0; }
.msg.system .nick::before, .msg.system .nick::after { display: none; }
.msg.system .prefix { color: var(--text-muted); margin-right: 0; }
.msg.system .body { font-size: 15px; }

.msg.join .body { color: var(--success); }
.msg.part .body, .msg.quit .body { color: var(--danger); }
.msg.mode .body { color: var(--info); }
.msg.action .body { color: var(--magenta); font-style: italic; }
.msg.notice .body { color: var(--info); }
.msg.topic .body { color: var(--info); }

.msg.emergency { background: color-mix(in srgb, var(--danger) 8%, transparent); }
.msg.emergency .body { color: var(--danger); font-weight: 600; }
.msg.emergency .nick { color: var(--danger) !important; }

.msg.encrypted { background: color-mix(in srgb, var(--warning) 6%, transparent); }
.msg.encrypted .body { color: var(--warning); font-style: italic; }

/* ── Call grouping — visual bracket for multi-transmission calls ── */
.msg.call-group-first,
.msg.call-group-mid,
.msg.call-group-last { position: relative; padding-top: 0; padding-bottom: 0; min-height: 18px; }
.msg.call-group-first::before,
.msg.call-group-mid::before,
.msg.call-group-last::before {
  content: ''; position: absolute; left: 70px; top: 0; bottom: 0;
  border-left: 2px solid var(--border-hover);
}
.msg.call-group-first::before { top: 50%; }
.msg.call-group-last::before { bottom: 50%; }
.msg.call-group-mid .ts, .msg.call-group-last .ts { visibility: hidden; }

/* ── Typing bar ── */
.typing-bar {
  min-height: 20px;
  padding: 2px 14px;
  font-size: 14px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.typing-bar .typing-nick { color: var(--irc-info); }

/* ── Audio player bar ── */
.player-bar {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
  flex-shrink: 0;
  padding: 4px 14px;
}
.player-bar.active { display: block; }
.player-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}
.player-btn {
  background: none;
  border: 1px solid var(--border-hover);
  color: var(--irc-info);
  font-size: 14px;
  width: 26px;
  height: 22px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: inherit;
  transition: border-color 0.15s, color 0.15s;
}
.player-btn:hover { border-color: var(--irc-info); color: var(--text); }
.player-btn.player-skip { color: var(--text-mid); font-size: 12px; width: 22px; }
.player-btn.player-skip:hover { border-color: var(--irc-success); color: var(--irc-success); }
.player-btn.player-close { color: var(--text-mid); font-size: 13px; width: 22px; }
.player-btn.player-close:hover { color: var(--danger); border-color: var(--danger); }
.player-info {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 14px;
  min-width: 0;
  flex-shrink: 0;
}
.player-nick { color: var(--irc-info); font-weight: 500; }
.player-chan { color: var(--text-muted); }
.player-time { color: var(--text-mid); font-size: 13px; font-variant-numeric: tabular-nums; }
.player-progress {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  min-width: 60px;
}
.player-progress-fill {
  height: 100%;
  background: var(--irc-info);
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
}
.player-progress:hover .player-progress-fill { background: var(--text); }
.player-segment {
  position: absolute; top: 0; height: 100%;
  border-radius: 2px; opacity: 0.3;
  pointer-events: none;
}
.player-segment.active { opacity: 0.6; }
.player-segment-divider {
  position: absolute; top: -2px; width: 1px; height: calc(100% + 4px);
  background: var(--text-muted); opacity: 0.5;
  pointer-events: none;
}

/* ── Voice message links ── */
.voice-play { color: var(--irc-info); font-size: 15px; margin-right: 2px; cursor: pointer; }
.voice-dur { color: var(--text); }
.voice-listen {
  color: var(--text-mid);
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px dotted var(--text-muted);
  margin-left: 4px;
  transition: color 0.15s;
}
.voice-listen:hover { color: var(--irc-info); border-bottom-color: var(--irc-info); }
.voice-text { color: var(--text); }
.voice-controls { color: var(--text-muted); font-size: 14px; margin-left: 6px; white-space: nowrap; }
.voice-controls .voice-play { font-size: 13px; }
.voice-controls .voice-listen { margin-left: 2px; }
.msg.now-playing { background: color-mix(in srgb, var(--irc-info) 4%, transparent); }
.msg.now-playing .voice-listen { color: var(--irc-info); border-bottom-color: var(--irc-info); }

/* ── Input ── */
.input-area {
  display: flex;
  align-items: center;
  border-top: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.input-prompt {
  padding: 0 4px 0 14px;
  color: var(--text-mid);
  font-size: 15px;
  user-select: none;
  white-space: nowrap;
}
.input-field {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  padding: 8px 8px;
  caret-color: var(--irc-info);
}
.input-field::placeholder { color: var(--text-muted); }

/* ── Nicklist ── */
.nicklist {
  width: var(--nicklist-width, 164px);
  flex: 0 0 var(--nicklist-width, 164px);
  min-width: 140px;
  max-width: 40vw;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
.nicklist-header {
  padding: 8px 10px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.nicklist-section-label {
  padding: 4px 10px 2px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}
.nicklist-entries {
  overflow-y: auto;
  flex: 1;
}
.nicklist-entries::-webkit-scrollbar { width: 6px; }
.nicklist-entries::-webkit-scrollbar-track { background: transparent; }
.nicklist-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.nick-item {
  padding: 1px 10px;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.nick-item:hover { background: var(--bg-elevated); }
.nick-item .nick-prefix { color: var(--text-muted); font-size: 13px; margin-right: 2px; }
.nick-item.op { color: var(--irc-info); }
.nick-item.voice { color: var(--irc-success); }
.nick-item.regular { color: var(--text-mid); }
.nick-item.offline { opacity: 0.35; }
.nick-item.talked::after { content: '●'; color: var(--irc-success); font-size: 10px; margin-left: 4px; vertical-align: middle; }

/* ── Nick tooltip ── */
.nick-tooltip {
  display: none; position: fixed; z-index: 100;
  background: var(--bg); border: 1px solid var(--border-hover); border-radius: 4px;
  padding: 6px 10px; font-size: 14px; line-height: 1.5;
  color: var(--text-mid); pointer-events: none;
  max-width: 260px; white-space: nowrap;
  box-shadow: var(--shadow-panel);
}
.nick-tooltip .tt-nick { color: var(--irc-info); font-weight: 600; }
.nick-tooltip .tt-label { color: var(--text-muted); }
.nick-tooltip .tt-online { color: var(--irc-success); }
.nick-tooltip .tt-offline { color: var(--text-faint); }
.msg .nick { cursor: pointer; }
.nick-item { cursor: pointer; }

/* ── Unit detail modal ── */
.unit-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
}
.unit-modal.visible { display: flex; }
.unit-modal-box {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0;
  max-width: 520px; width: 94%; max-height: 85vh;
  display: flex; flex-direction: column;
  position: relative;
}
.unit-modal-close {
  position: absolute; top: 10px; right: 12px; z-index: 1;
  background: none; border: none; color: var(--text-muted);
  font-size: 22px; cursor: pointer; line-height: 1;
  padding: 4px 8px; border-radius: 3px;
}
.unit-modal-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.unit-modal-header {
  padding: 20px 20px 12px;
  display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
}
.unit-modal-uid {
  font-family: inherit; font-size: 22px; font-weight: 600;
  color: var(--text);
}
.unit-modal-nick {
  font-size: 14px; color: var(--irc-info);
}
.unit-modal-system {
  font-size: 11px; color: var(--text-muted);

}
.unit-event-type.state-active { background: var(--irc-success); color: #000; }
.unit-event-type.state-recent { background: color-mix(in srgb, var(--irc-success) 60%, var(--bg-surface)); color: #000; }

.unit-event-type.state-location { background: var(--irc-warning); color: #000; }

.unit-event-type.state-signal { background: var(--irc-warning); color: #000; }
.unit-event-type.state-off { background: var(--text-faint); color: var(--bg-surface); }
.unit-event-tg {
  color: var(--text-muted); white-space: nowrap; overflow: hidden;

.unit-modal-loading {

/* ── Status bar ── */

/* ══════════════════════════════════════════════════════════════ */
/* MOBILE RESPONSIVE — below 768px                               */
/* ══════════════════════════════════════════════════════════════ */

@media (max-width: 768px) {
  /* Hide CRT effects on mobile for performance */
  body::before, body::after, .vignette-overlay { display: none; }

  /* Titlebar becomes mobile nav */
  .titlebar {
    height: 44px;
    padding: 0 8px;
    justify-content: space-between;
  }
  .titlebar .topic { display: none; }

  /* Hamburger button */
  .mobile-hamburger {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    font-size: 20px;
    cursor: pointer;
    color: var(--text);
    border: none;
    background: none;
  }

  /* Channel tree becomes slide-out drawer */
  .channel-tree {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    flex: none;
    max-width: none;
    z-index: 1000;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    box-shadow: none;
  }
  .channel-tree.open {
    transform: translateX(0);
    box-shadow: 4px 0 20px rgba(0,0,0,0.3);
  }

  /* Nicklist becomes slide-out drawer from right */
  .nicklist {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 240px;
    flex: none;
    max-width: none;
    z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    box-shadow: none;
  }
  .nicklist.open {
    transform: translateX(0);
    box-shadow: -4px 0 20px rgba(0,0,0,0.3);
  }

  /* Drawer backdrop */
  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }
  .drawer-backdrop.visible { display: block; }

  /* Messages take full width */
  .chat-area { flex: 1; min-width: 0; }
  .messages { font-size: 14px; }

  /* Channel bar simplification */
  .channel-bar {
    height: 36px;
    font-size: 13px;
  }

  /* Input area */
  .input-area { font-size: 14px; }
  .input-field { font-size: 14px; }

  /* Status bar */
  .statusbar { font-size: 11px; padding: 0 6px; }

  /* Nick width smaller on mobile */
  .nick { max-width: 80px !important; }

  /* Larger touch targets for audio play buttons */
  .voice-play {
    min-width: 44px;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* Favorite stars and scan icons always visible (no hover on touch) */
  .fav-star, .scan-icon { opacity: 1; }

  /* Card-style messages for mobile */
  .msg {
    flex-direction: column;
    padding: 6px 10px;
    gap: 2px;
    position: relative;
  }
  .msg .ts {
    position: absolute;
    right: 10px;
    top: 6px;
    font-size: 11px;
    min-width: auto;
  }
  .msg .nick {
    font-weight: 500;
    flex: 0 1 auto;
    min-width: 0;
    max-width: min(40vw, 320px);
    text-align: right;
    padding-right: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
  .msg .body {
    padding-left: 0;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.emergency {
    border-left: 3px solid var(--danger);
    background: none;
  }
}

/* Desktop: hide mobile-only elements */
@media (min-width: 769px) {
  .mobile-hamburger { display: none; }
  .mobile-users-btn { display: none; }
  .drawer-backdrop { display: none !important; }
}

@media (max-width: 768px) {
  .panel-resizer { display: none; }
}
</style>

<script>
// ══════════════════════════════════════════════════════════════
// TODO — Enhancement ideas
// ══════════════════════════════════════════════════════════════
// [x] Favorite/pinned channels — star channels to pin at top of tree (localStorage)
// [x] Channel search box — filter input at top of tree for instant name filtering
// [ ] Emergency flash in tree — pulse channel name red on emergency calls
// [x] Scanner mode — toggle to auto-play audio as transmissions arrive
// [ ] Keyboard channel nav — Alt+Up/Down to cycle channels with activity
// [ ] Transmission count on nicks — show count next to dot (e.g. "●12")
// [ ] Desktop notifications — browser notifications for backgrounded tab activity
// [x] Unit info on hover — tooltip with system, unit ID, status, last TX time
// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
// CONFIG — set your tr-engine base URL
// Override via query param: ?api=http://localhost:3000/api/v1
// ══════════════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const API_BASE = (params.get('api') || '/api/v1').replace(/\/+$/, '');

const MAX_MESSAGES = 500;        // per channel scrollback
const NICK_WIDTH = 130;          // px
const TYPING_DURATION = 3000;    // ms

// ── Op patterns: comma-separated regexes matched against unit nicks ──
// Units matching any pattern get @ (op) status in the nicklist.
// Edit here or use /ops at runtime. Stored in localStorage.
const DEFAULT_OP_PATTERNS = 'LocutionLCD,\\dCOM,CHF,CAPT,BATT,Desk';

// ── Nick color palette ──
const NICK_COLORS = [
  'var(--irc-info)', 'var(--irc-success)', 'var(--irc-warning)',
  'var(--magenta)', 'var(--warning)', 'var(--info)',
  'var(--danger)', 'var(--success)', 'var(--rose)', 'var(--lime)',
];
function nickColor(nick) {
  let h = 0;
  for (let i = 0; i < nick.length; i++) h = ((h << 5) - h + nick.charCodeAt(i)) | 0;
  return NICK_COLORS[Math.abs(h) % NICK_COLORS.length];
}

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════

// Channel registry: keyed by IRC-style name (#alpha-tag)
// { chanName: { tgid, system_id, alpha_tag, description, tag, group, mode, users: Map<unit_id, {nick, prefix, role}>, messages: [] } }
const channels = new Map();
const channelUnread = new Map();

// Reverse lookups
const tgidToChannel = new Map();   // `${system_id}:${tgid}` → chanName
const unitNickCache = new Map();   // `${system_id}:${unit_id}` → alpha_tag
const systemNames = new Map();     // system_id → system_name
const collidedNames = new Set();   // base channel names that have had collisions

// Active channel
let activeChannel = '*status';

// Status channel for server messages
const STATUS_CHANNEL = '*status';

// Starred meta-channel: aggregates all favorited talkgroup activity
const STARRED_CHANNEL = '\u2605 Starred';

// Connection state
let sseConnection = null;
let connectionState = 'disconnected'; // connecting, connected, disconnected
let reconnectTimer = null;
let lastEventId = null;
let eventRate = [];

// Typing state: Map<chanName, { nick, timeout }>
const typingState = new Map();

// Active calls tracker: Map<call_id, { tgid, system_id, units, start }>
const activeCalls = new Map();

// Pending transcriptions: transcription SSE events that arrived before messages were rendered.
// Map<call_id, { system_id, tgid, text, ... }> — applied when messages appear.
const pendingTranscriptions = new Map();

// Call src_list cache: Map<call_id, srcList[]> — for player segment display
const callSrcLists = new Map();

// Activity tracking for channel tree collapse
const channelHasActivity = new Set();   // channels with real messages
const groupCollapsed = new Map();       // group collapse state (true = show all, false = collapsed)
const channelLoading = new Set();       // prevent duplicate lazy-loads
const channelLoadedCallIds = new Map(); // chanName -> Set<callId> — deduplicate across bootstrap and lazy load
const channelLoadedEventIds = new Map(); // chanName -> Set<eventId> — deduplicate unit events across bootstrap and lazy load
const liveUnitDedup = new Map();         // "sysId:unitId:type:tgid" -> timestamp — dedup live SSE unit events (multi-site)

// ── DOM refs ──
const messagesEl = document.getElementById('messages');
const typingBar = document.getElementById('typing-bar');
const inputField = document.getElementById('input-field');
const chanNameEl = document.getElementById('chan-name');
const chanTopicEl = document.getElementById('chan-topic');
const chanModeEl = document.getElementById('chan-mode');
const chanCountEl = document.getElementById('chan-count');
const nicklistHeader = document.getElementById('nicklist-header');
const nicklistEntries = document.getElementById('nicklist-entries');
const titlebarChan = document.getElementById('titlebar-chan');
const titlebarEditBtn = document.getElementById('titlebar-edit-btn');
const titlebarTopic = document.getElementById('titlebar-topic');
const titlebarLag = document.getElementById('titlebar-lag');
const chanEditBtn = document.getElementById('chan-edit-btn');
const treeScroll = document.getElementById('tree-scroll');
const treeStatus = document.getElementById('tree-status');
const statusDot = document.getElementById('status-dot');
const statusServer = document.getElementById('status-server');
const statusChannelsEl = document.getElementById('status-channels');
const statusUsersEl = document.getElementById('status-users');
const statusRate = document.getElementById('status-rate');
const statusTime = document.getElementById('status-time');
const inputPrompt = document.getElementById('input-prompt');
const mainEl = document.querySelector('.main');
const channelTreeEl = document.getElementById('channel-tree');
const nicklistEl = document.getElementById('nicklist');
const channelResizerEl = document.getElementById('channel-resizer');
const nicklistResizerEl = document.getElementById('nicklist-resizer');

// Search state
let treeSearchQuery = '';
const treeSearchInput = document.getElementById('tree-search');
const treeSearchClear = document.getElementById('tree-search-clear');

let searchTimer = 0;
treeSearchInput.addEventListener('input', () => {
  treeSearchQuery = treeSearchInput.value.trim().toLowerCase();
  treeSearchClear.classList.toggle('visible', treeSearchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderTree, 150);
});
treeSearchClear.addEventListener('click', () => {
  treeSearchInput.value = '';
  treeSearchQuery = '';
  treeSearchClear.classList.remove('visible');
  renderTree();
});

// Favorites: Set of "system_id:tgid" keys
function loadSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
  catch { localStorage.removeItem(key); return new Set(); }
}
const favorites = loadSet('irc_favorites');

function saveFavorites() {
  localStorage.setItem('irc_favorites', JSON.stringify([...favorites]));
}

function isFavorite(chanName) {
  const ch = channels.get(chanName);
  if (!ch) return false;
  return favorites.has(`${ch.system_id}:${ch.tgid}`);
}

function toggleFavorite(chanName) {
  const ch = channels.get(chanName);
  if (!ch) return;
  const key = `${ch.system_id}:${ch.tgid}`;
  if (favorites.has(key)) favorites.delete(key);
  else favorites.add(key);
  saveFavorites();
  updateStarredChannel();
  renderTree();
}

// ── Starred meta-channel management ──

function updateStarredChannel() {
  const hasFavs = favorites.size > 0 && [...channels.keys()].some(ch => ch !== STATUS_CHANNEL && ch !== STARRED_CHANNEL && isFavorite(ch));
  if (hasFavs && !channels.has(STARRED_CHANNEL)) {
    createStarredChannel();
  } else if (!hasFavs && channels.has(STARRED_CHANNEL)) {
    destroyStarredChannel();
  } else if (hasFavs && channels.has(STARRED_CHANNEL)) {
    // Update topic with current count
    const count = [...channels.keys()].filter(ch => ch !== STATUS_CHANNEL && ch !== STARRED_CHANNEL && isFavorite(ch)).length;
    const st = channels.get(STARRED_CHANNEL);
    st.description = `Aggregating ${count} starred channel${count !== 1 ? 's' : ''}`;
  }
}

function createStarredChannel() {
  const count = [...channels.keys()].filter(ch => ch !== STATUS_CHANNEL && ch !== STARRED_CHANNEL && isFavorite(ch)).length;
  channels.set(STARRED_CHANNEL, {
    tgid: null,
    system_id: null,
    alpha_tag: STARRED_CHANNEL,
    description: `Aggregating ${count} starred channel${count !== 1 ? 's' : ''}`,
    tag: '',
    group: 'Favorites',
    mode: '',
    users: new Map(),
    messages: [],
    historyExhausted: false,
  });
  channelUnread.set(STARRED_CHANNEL, 0);
}

function destroyStarredChannel() {
  if (activeChannel === STARRED_CHANNEL) {
    switchChannel(STATUS_CHANNEL);
  }
  channels.delete(STARRED_CHANNEL);
  channelUnread.delete(STARRED_CHANNEL);
  channelLoadedCallIds.delete(STARRED_CHANNEL);
}

/** Forward a message to the starred channel with an origin tag */
function forwardToStarred(sourceChannel, msg) {
  if (!channels.has(STARRED_CHANNEL)) return;
  if (sourceChannel === STARRED_CHANNEL || sourceChannel === STATUS_CHANNEL) return;
  if (!isFavorite(sourceChannel)) return;
  // Only forward real messages (calls, unit events), not system notices
  if (msg.kind === 'topic' || msg.kind === 'mode') return;

  const copy = Object.assign({}, msg);
  copy.originChannel = sourceChannel;
  addMsg(STARRED_CHANNEL, copy, true); // skipForward=true to prevent recursion
}

// Scanner mode
const scanChannels = loadSet('irc_scan_channels');
let scannerEnabled = localStorage.getItem('irc_scanner_enabled') === '1';
let scannerAutoSwitch = localStorage.getItem('irc_scanner_auto_switch') !== '0'; // default ON

function saveScanChannels() {
  localStorage.setItem('irc_scan_channels', JSON.stringify([...scanChannels]));
}

function isScanned(chanName) {
  const ch = channels.get(chanName);
  if (!ch) return false;
  return scanChannels.has(`${ch.system_id}:${ch.tgid}`);
}

function toggleScan(chanName) {
  const ch = channels.get(chanName);
  if (!ch) return;
  const key = `${ch.system_id}:${ch.tgid}`;
  if (scanChannels.has(key)) scanChannels.delete(key);
  else scanChannels.add(key);
  saveScanChannels();
  renderTree();
}

// Scanner audio queue
const scannerQueue = []; // Array of { callId, nick, chanName, emergency }
const SCANNER_MAX_QUEUE = 10;
let scannerPlaying = false;

function scannerEnqueue(callId, nick, chanName, emergency) {
  if (!scannerEnabled) return;
  if (!isScanned(chanName)) return;

  // Emergency calls go to front of queue (after currently playing)
  if (emergency) {
    if (scannerQueue.length >= SCANNER_MAX_QUEUE) {
      scannerQueue.pop(); // drop oldest non-emergency from end
    }
    scannerQueue.splice(0, 0, { callId, nick, chanName, emergency });
  } else {
    // Overflow protection
    if (scannerQueue.length >= SCANNER_MAX_QUEUE) {
      const dropped = scannerQueue.length - SCANNER_MAX_QUEUE + 1;
      scannerQueue.splice(0, dropped);
      addMsg(STATUS_CHANNEL, { ts: ts(), kind: 'notice',
        text: `Scanner: skipped ${dropped} transmission(s) \u2014 queue overflow` });
    }
    scannerQueue.push({ callId, nick, chanName, emergency });
  }
  updateScannerQueueUI();

  // If nothing is playing, start playback
  if (!scannerPlaying) scannerPlayNext();
}

function scannerPlayNext() {
  if (scannerQueue.length === 0) {
    scannerPlaying = false;
    updateScannerQueueUI();
    return;
  }

  scannerPlaying = true;
  const item = scannerQueue.shift();
  updateScannerQueueUI();

  // Auto-switch channel if enabled
  if (scannerAutoSwitch && item.chanName !== activeChannel) {
    switchChannel(item.chanName);
  }

  // Find the message element for this call in the active channel
  let msgEl = null;
  if (item.chanName === activeChannel) {
    msgEl = messagesEl.querySelector(`[data-call-id="${item.callId}"]`);
  }

  // Play the call audio
  playCall(item.callId, item.nick, item.chanName, msgEl);
}

function updateScannerQueueUI() {
  const info = document.getElementById('scanner-queue-info');
  if (!info) return;
  if (!scannerEnabled || (scannerQueue.length === 0 && !scannerPlaying)) {
    info.textContent = '';
  } else {
    const total = scannerQueue.length + (scannerPlaying ? 1 : 0);
    info.textContent = total > 1 ? `(${total} queued)` : '';
  }
}

function ts(date) {
  const d = date || new Date();
  const time = d.toTimeString().slice(0, 5);
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (msgDay.getTime() >= todayStart.getTime()) return time;
  const m = d.getMonth() + 1;
  const day = d.getDate();
  return `${m}/${day} ${time}`;
}

function tsLong(date) {
  const d = date || new Date();
  return d.toTimeString().slice(0, 8);
}

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function formatDateSeparator(date) {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = Math.round((todayStart - msgDay) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return DAYS_LONG[date.getDay()];
  return `${DAYS_LONG[date.getDay()]}, ${MONTHS_SHORT[date.getMonth()]} ${date.getDate()}`;
}

let lastRenderedDateStr = '';

/** Convert a talkgroup alpha_tag to an IRC channel name */
function toChannelName(alphaTag) {
  if (!alphaTag) return '#unknown';
  // Replace spaces and special chars with hyphens, collapse runs
  let name = alphaTag.replace(/[\s\/\\]+/g, '-').replace(/[^a-zA-Z0-9\-_.]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '');
  return '#' + (name || 'unknown');
}

/** Sanitize a unit alpha_tag into an IRC nick */
function toNick(alphaTag, unitId) {
  if (alphaTag && alphaTag.trim()) {
    return alphaTag.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-\[\]{}|]/g, '');
  }
  return 'unit-' + unitId;
}

/** Determine user role from nick/alpha_tag */
function getOpPatterns() { return localStorage.getItem('op_patterns') || DEFAULT_OP_PATTERNS; }
function buildOpRegex(csv) { return new RegExp(csv.split(',').map(s => s.trim()).filter(Boolean).join('|'), 'i'); }
let opRegex = buildOpRegex(getOpPatterns());
function roleForNick(nick) {
  if (!nick) return 'regular';
  return opRegex.test(nick) ? 'op' : 'regular';
}
function reapplyRoles() {
  for (const ch of channels.values()) {
    for (const u of ch.users.values()) {
      u.role = roleForNick(u.nick);
      u.prefix = u.role === 'op' ? '@' : '';
    }
  }
  renderNicklist();
}

/** Nick tooltip */
const nickTooltip = document.getElementById('nick-tooltip');
let tooltipTimer = null;

function findUserByNick(nick) {
  // Search active channel first, then all channels
  const state = channels.get(activeChannel);
  if (state) {
    for (const u of state.users.values()) {
      if (u.nick === nick) return { user: u, channel: activeChannel, chState: state };
    }
  }
  for (const [chName, ch] of channels) {
    for (const u of ch.users.values()) {
      if (u.nick === nick) return { user: u, channel: chName, chState: ch };
    }
  }
  return null;
}

function getLastTxTime(nick) {
  const state = channels.get(activeChannel);
  if (!state) return null;
  for (let i = state.messages.length - 1; i >= 0; i--) {
    if (state.messages[i].nick === nick) return state.messages[i].date || null;
  }
  return null;
}

function countTx(nick) {
  const state = channels.get(activeChannel);
  if (!state) return 0;
  let n = 0;
  for (const m of state.messages) { if (m.nick === nick) n++; }
  return n;
}

function showNickTooltip(nick, el) {
  clearTimeout(tooltipTimer);
  const found = findUserByNick(nick);
  if (!found) return;
  const { user, chState } = found;

  const sysName = systemNames.get(user.systemId) || `System ${user.systemId}`;
  const online = user.online !== false;
  const statusHtml = online
    ? '<span class="tt-online">online</span>'
    : '<span class="tt-offline">offline</span>';
  const lastTx = getLastTxTime(nick);
  const txCount = countTx(nick);

  let html = `<span class="tt-nick">${esc(nick)}</span><br>`;
  html += `<span class="tt-label">Unit:</span> ${user.unitId}<br>`;
  html += `<span class="tt-label">System:</span> ${esc(sysName)}<br>`;
  html += `<span class="tt-label">Status:</span> ${statusHtml}`;
  if (user.role === 'op') html += ` <span class="tt-label">(op)</span>`;
  if (txCount > 0) {
    html += `<br><span class="tt-label">TX in history:</span> ${txCount}`;
  }
  if (lastTx) {
    html += `<br><span class="tt-label">Last TX:</span> ${ts(lastTx)}`;
  }

  nickTooltip.innerHTML = html;
  nickTooltip.style.display = 'block';

  const rect = el.getBoundingClientRect();
  let left = rect.right + 8;
  let top = rect.top;

  // If tooltip would overflow right side, position to the left
  const ttWidth = nickTooltip.offsetWidth;
  if (left + ttWidth > window.innerWidth - 10) {
    left = rect.left - ttWidth - 8;
  }
  // Keep within viewport vertically
  const ttHeight = nickTooltip.offsetHeight;
  if (top + ttHeight > window.innerHeight - 10) {
    top = window.innerHeight - ttHeight - 10;
  }

  nickTooltip.style.left = left + 'px';
  nickTooltip.style.top = top + 'px';
}

function hideNickTooltip() {
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => { nickTooltip.style.display = 'none'; }, 100);
}

// ── Unit detail modal ──
let currentModalUnit = null;

function relativeTime(isoString) {
  if (!isoString) return '\u2014';
  const now = Date.now();
  const t = new Date(isoString).getTime();
  const diff = now - t;
  if (diff < 0 || diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 172800000) return 'yesterday';
  const d = new Date(isoString);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function eventTypeStateClass(eventType) {
  switch (eventType) {
    case 'call': return 'state-active';
    case 'end': return 'state-recent';
    case 'join': case 'on': return 'state-affiliated';
    case 'off': return 'state-off';
    case 'location': return 'state-location';
    case 'ackresp': case 'data': return 'state-data';
    case 'signal': return 'state-signal';
    default: return 'state-affiliated';
  }
}

function setEventsLoading(container, text) {
  container.textContent = '';
  const el = document.createElement('div');
  el.className = 'unit-modal-loading';
  el.textContent = text;
  container.appendChild(el);
}

function openUnitModal(user) {
  currentModalUnit = user;
  hideNickTooltip();

  const modal = document.getElementById('unit-modal');
  const uidEl = document.getElementById('unit-modal-uid');
  const nickEl = document.getElementById('unit-modal-nick');
  const sysEl = document.getElementById('unit-modal-system');
  const tagInput = document.getElementById('unit-modal-tag');
  const saveBtn = document.getElementById('unit-modal-save');
  const saveStatus = document.getElementById('unit-modal-save-status');
  const metaEl = document.getElementById('unit-modal-meta');
  const eventsEl = document.getElementById('unit-modal-events');

  uidEl.textContent = user.unitId;
  nickEl.textContent = user.nick;
  sysEl.textContent = systemNames.get(user.systemId) || '';
  tagInput.value = '';
  tagInput._originalTag = '';
  saveBtn.disabled = true;
  saveStatus.textContent = '';
  saveStatus.style.color = '';
  metaEl.textContent = '';
  setEventsLoading(eventsEl, 'Loading events...');

  modal.classList.add('visible');

  tagInput.oninput = () => {
    saveBtn.disabled = tagInput.value.trim() === tagInput._originalTag;
    saveStatus.textContent = '';
  };
  saveBtn.onclick = () => saveUnitTag(user, tagInput.value.trim());
  tagInput.onkeydown = (e) => {
    if (e.key === 'Enter' && !saveBtn.disabled) saveBtn.click();
  };

  const unitId = encodeURIComponent(user.systemId + ':' + user.unitId);

  // Parallel fetch: unit detail + recent events
  fetch(API_BASE + '/units/' + unitId)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || currentModalUnit !== user) return;
      if (data.system_name) sysEl.textContent = data.system_name;
      if (data.alpha_tag) {
        tagInput.value = data.alpha_tag;
        tagInput._originalTag = data.alpha_tag;
        saveBtn.disabled = true;
      }
      metaEl.textContent = '';
      const addMeta = (label, value) => {
        const l = document.createElement('span');
        l.className = 'unit-modal-meta-label';
        l.textContent = label;
        const v = document.createElement('span');
        v.className = 'unit-modal-meta-value';
        v.textContent = value || '\u2014';
        metaEl.appendChild(l);
        metaEl.appendChild(v);
      };
      addMeta('State', data.last_event_type || 'unknown');
      if (data.last_event_tg_tag || data.last_event_tgid) {
        addMeta('Last TG', (data.last_event_tg_tag || '') + (data.last_event_tgid ? ' (' + data.last_event_tgid + ')' : ''));
      }
      addMeta('First seen', relativeTime(data.first_seen));
      addMeta('Last seen', relativeTime(data.last_seen));
    })
    .catch(() => {});

  fetch(API_BASE + '/units/' + unitId + '/events?limit=30')
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || currentModalUnit !== user) return;
      const events = data.events || [];
      eventsEl.textContent = '';
      if (events.length === 0) {
        setEventsLoading(eventsEl, 'No recent events');
        return;
      }
      // Collapse consecutive runs of same (event_type, tgid)
      const grouped = [];
      events.forEach(ev => {
        const prev = grouped[grouped.length - 1];
        if (prev && prev.event_type === ev.event_type && (prev.tgid || 0) === (ev.tgid || 0)) {
          prev.count++;
        } else {
          grouped.push({ event_type: ev.event_type, time: ev.time, tgid: ev.tgid,
            tg_alpha_tag: ev.tg_alpha_tag, count: 1 });
        }
      });
      grouped.forEach(ev => {
        const row = document.createElement('div');
        row.className = 'unit-event-row';

        const timeSpan = document.createElement('span');
        timeSpan.className = 'unit-event-time';
        timeSpan.textContent = relativeTime(ev.time);

        const typePill = document.createElement('span');
        typePill.className = 'unit-event-type ' + eventTypeStateClass(ev.event_type);
        typePill.textContent = ev.event_type + (ev.count > 1 ? ' \u00d7' + ev.count : '');

        const tgSpan = document.createElement('span');
        tgSpan.className = 'unit-event-tg';
        tgSpan.textContent = ev.tg_alpha_tag || (ev.tgid ? 'TG ' + ev.tgid : '\u2014');

        row.appendChild(timeSpan);
        row.appendChild(typePill);
        row.appendChild(tgSpan);
        eventsEl.appendChild(row);
      });
    })
    .catch(() => {
      setEventsLoading(eventsEl, 'Failed to load events');
    });
}

function closeUnitModal() {

function saveUnitTag(user, newTag) {
  const saveBtn = document.getElementById('unit-modal-save');
  const saveStatus = document.getElementById('unit-modal-save-status');
  const tagInput = document.getElementById('unit-modal-tag');

  saveBtn.disabled = true;
  saveStatus.textContent = '...';
  saveStatus.className = 'unit-modal-save-status';
  saveStatus.style.color = '';

  const unitId = encodeURIComponent(user.systemId + ':' + user.unitId);
  fetch(API_BASE + '/units/' + unitId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ alpha_tag: newTag, alpha_tag_source: 'manual' }),
  })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(() => {
      tagInput._originalTag = newTag;
      saveBtn.disabled = true;
      saveStatus.textContent = '\u2713';
      saveStatus.style.color = 'var(--irc-success)';
      setTimeout(() => { saveStatus.textContent = ''; }, 2000);

      // Bust nick cache and update nick across users + already-rendered messages
      const uk = unitKey(user.systemId, user.unitId);
      const oldNick = user.nick;
      unitNickCache.delete(uk);
      const newNick = resolveNick(user.systemId, user.unitId, newTag);

      for (const [chanName, ch] of channels) {
        if (ch.users.has(uk)) {
          ch.users.get(uk).nick = newNick;
        }
        let changed = false;
        for (const msg of ch.messages) {
          if (msg.nick === oldNick) {
            msg.nick = newNick;
            changed = true;
            if (chanName === activeChannel && msg._el) {
              const nickNode = msg._el.querySelector('.nick');
              if (nickNode) {
                nickNode.textContent = newNick;
                nickNode.dataset.nick = newNick;
                nickNode.style.color = nickColor(newNick);
              } else {
                refreshMsgEl(msg);
              }
            }
          }
        }
        if (changed && chanName !== activeChannel && chanName === STARRED_CHANNEL) {
          // no-op, kept for symmetry with aggregated channel updates
        }
      }

      user.nick = newNick;
      user.alphaTag = newTag;
      document.getElementById('unit-modal-nick').textContent = newNick;
      renderNicklist();
    })
    .catch(() => {
      saveBtn.disabled = false;
      saveStatus.textContent = 'Error';
      saveStatus.className = 'unit-modal-save-status unit-modal-error';
    });
}

/** Format frequency in MHz */
function fmtFreq(hz) {
  if (!hz) return '';
  return (hz / 1e6).toFixed(4) + ' MHz';
}

/** Format duration */
function fmtDuration(sec) {
  if (!sec && sec !== 0) return '';
  if (sec < 60) return sec.toFixed(1) + 's';
  return Math.floor(sec / 60) + 'm' + Math.floor(sec % 60) + 's';
}

/** Format transcription text for IRC display — clean spacing. */
function fmtTranscript(text) {
  if (!text) return '';
  return text
    .replace(/\s+/g, ' ')   // collapse whitespace runs
    .trim();
}

/** Fuzzy channel match: exact → substring → stripped alphanumeric substring */
function fuzzyMatchChannel(input) {
  const exact = '#' + input;
  if (channels.has(exact)) return exact;

  const lower = input.toLowerCase();
  // Substring match on channel name
  for (const name of channels.keys()) {
    if (name.toLowerCase().includes(lower)) return name;
  }

  // Strip non-alphanumeric from both input and channel names, then substring match
  const stripped = lower.replace(/[^a-z0-9]/g, '');
  if (!stripped) return null;
  let best = null;
  let bestLen = Infinity;
  for (const name of channels.keys()) {
    const nameStripped = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (nameStripped.includes(stripped)) {
      // Prefer shortest match (most specific)
      if (nameStripped.length < bestLen) {
        best = name;
        bestLen = nameStripped.length;
      }
    }
  }
  return best;
}

/** Composite key for tgid lookup */
function tgKey(systemId, tgid) { return `${systemId}:${tgid}`; }
function unitKey(systemId, unitId) { return `${systemId}:${unitId}`; }

// CHANNEL MANAGEMENT
// ══════════════════════════════════════════════════════════════

function initStatusChannel() {
  channels.set(STATUS_CHANNEL, {
    tgid: null, system_id: null,
    alpha_tag: 'status', description: 'Server messages',
    tag: '', group: 'System', mode: '',
    users: new Map(), messages: [],
  });
  channelUnread.set(STATUS_CHANNEL, 0);
}

/** Rename a channel in all maps/sets, preserving state */
function renameChannel(oldName, newName) {
  if (oldName === newName || !channels.has(oldName)) return;
  const state = channels.get(oldName);
  channels.delete(oldName);
  channels.set(newName, state);
  channelUnread.set(newName, channelUnread.get(oldName) || 0);
  channelUnread.delete(oldName);
  if (channelHasActivity.has(oldName)) {
    channelHasActivity.delete(oldName);
    channelHasActivity.add(newName);
  }
  if (channelLoadedCallIds.has(oldName)) {
    channelLoadedCallIds.set(newName, channelLoadedCallIds.get(oldName));
    channelLoadedCallIds.delete(oldName);
  }
  if (channelLoadedEventIds.has(oldName)) {
    channelLoadedEventIds.set(newName, channelLoadedEventIds.get(oldName));
    channelLoadedEventIds.delete(oldName);
  }
  // Update tgidToChannel reverse lookup
  const key = tgKey(state.system_id, state.tgid);
  tgidToChannel.set(key, newName);
  if (activeChannel === oldName) activeChannel = newName;
}

/** Build a disambiguated channel suffix for a talkgroup */
function disambiguatedName(baseName, systemId, tgid) {
  const sysName = systemNames.get(systemId);
  if (sysName) {
    const withSys = baseName + '-' + toChannelName(sysName).slice(1); // strip leading #
    if (!channels.has(withSys)) return withSys;
  }
  // Same system or system name still collides — use tgid
  return baseName + '-' + tgid;
}

function ensureChannel(tg) {
  const key = tgKey(tg.system_id, tg.tgid);
  if (tgidToChannel.has(key)) return tgidToChannel.get(key);

  if (tg.system_name && !systemNames.has(tg.system_id)) systemNames.set(tg.system_id, tg.system_name);
  const chanName = toChannelName(tg.alpha_tag || tg.tg_alpha_tag);

  // Handle collisions — disambiguate both the existing and new channel
  let finalName = chanName;
  if (channels.has(finalName)) {
    const existing = channels.get(finalName);
    if (existing.tgid !== tg.tgid || existing.system_id !== tg.system_id) {
      collidedNames.add(chanName);
      const sameSystem = existing.system_id === tg.system_id;
      // Rename the existing channel to also be disambiguated
      const existingNewName = sameSystem
        ? chanName + '-' + existing.tgid
        : disambiguatedName(chanName, existing.system_id, existing.tgid);
      renameChannel(finalName, existingNewName);
      // Now pick a name for the new channel
      finalName = sameSystem
        ? chanName + '-' + tg.tgid
        : disambiguatedName(chanName, tg.system_id, tg.tgid);
    }
  } else if (collidedNames.has(chanName)) {
    // This base name has collided before — always disambiguate
    finalName = disambiguatedName(chanName, tg.system_id, tg.tgid);
  }

  if (!channels.has(finalName)) {
    channels.set(finalName, {
      tgid: tg.tgid,
      system_id: tg.system_id,
      alpha_tag: tg.alpha_tag || tg.tg_alpha_tag || `TG ${tg.tgid}`,
      description: tg.description || tg.tg_description || '',
      tag: tg.tag || tg.tg_tag || '',
      group: tg.group || tg.tg_group || 'Ungrouped',
      mode: '+nt',
      users: new Map(),
      messages: [],
      historyExhausted: false,
    });
    channelUnread.set(finalName, 0);
  }

  tgidToChannel.set(key, finalName);
  return finalName;
}

function resolveChannel(systemId, tgid) {
  return tgidToChannel.get(tgKey(systemId, tgid));
}

function resolveNick(systemId, unitId, alphaTag) {
  const key = unitKey(systemId, unitId);
  if (alphaTag && alphaTag.trim()) {
    const nick = toNick(alphaTag, unitId);
    unitNickCache.set(key, nick);
    return nick;
  }
  if (unitNickCache.has(key)) return unitNickCache.get(key);
  const fallback = toNick(null, unitId);
  unitNickCache.set(key, fallback);
  return fallback;
}


// ══════════════════════════════════════════════════════════════
// MESSAGE RENDERING
// ══════════════════════════════════════════════════════════════

function addMsg(channel, msg, skipForward) {
  const state = channels.get(channel);
  if (!state) return;

  state.messages.push(msg);
  if (state.messages.length > MAX_MESSAGES) {
    state.messages.shift();
    if (channel === activeChannel) messagesEl.firstChild?.remove();
  }

  // Track live activity — real messages (not notices/topic/mode) promote channels
  if (msg.kind !== 'notice' && msg.kind !== 'topic' && msg.kind !== 'mode') {
    if (!channelHasActivity.has(channel)) {
      channelHasActivity.add(channel);
      renderTree();
    }
  }

  if (channel === activeChannel) {
    const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
    appendMsgDOM(msg);
    if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
  } else {
    channelUnread.set(channel, (channelUnread.get(channel) || 0) + 1);
    renderTree();
  }

  eventRate.push(Date.now());

  // Forward to starred channel (unless this IS the starred channel or already forwarded)
  if (!skipForward && channel !== STARRED_CHANNEL && channel !== STATUS_CHANNEL) {
    forwardToStarred(channel, msg);
  }
}

/** Build a DOM element for a message (content only, no append or call-group context). */
function buildMsgEl(m) {
  const div = document.createElement('div');
  let classes = 'msg';
  if (m.kind) classes += ` ${m.kind}`;
  if (m.emergency) classes += ' emergency';
  if (m.encrypted) classes += ' encrypted';
  div.className = classes;

  const isSystem = ['join', 'part', 'quit', 'mode', 'topic', 'notice'].includes(m.kind);
  const isAction = m.kind === 'action';

  if (isSystem) {
    div.innerHTML = `<span class="ts">${esc(m.ts)}</span><span class="prefix">***</span><span class="body"> ${esc(m.text)}</span>`;
    div.classList.add('system');
  } else if (isAction) {
    div.innerHTML = `<span class="ts">${esc(m.ts)}</span><span class="prefix">*</span><span class="body"> ${esc(m.nick)} ${esc(m.text)}</span>`;
    div.classList.add('system');
  } else {
    const color = nickColor(m.nick || '');
    let nickHtml = `<span class="ts">${esc(m.ts)}</span>`;
    // Origin channel tag for starred channel aggregated messages
    if (m.originChannel) {
      nickHtml += `<span class="origin-tag" data-channel="${esc(m.originChannel)}">${esc(m.originChannel)}</span>`;
    }
    nickHtml += `<span class="nick" style="color:${color}" data-nick="${esc(m.nick || '')}">${esc(m.nick || '???')}</span>`;

    // Voice message with audio link (and optional transcription text)
    if (m.callId) {
      const dur = m.duration || '';
      const body = document.createElement('span');
      body.className = 'body';

      if (m.text) {
        // Transcription text with compact audio controls
        const textSpan = document.createElement('span');
        textSpan.className = 'voice-text';
        textSpan.textContent = m.text;
        body.appendChild(textSpan);

        const controls = document.createElement('span');
        controls.className = 'voice-controls';
        const play = document.createElement('span');
        play.className = 'voice-play';
        play.textContent = '▶';
        play.addEventListener('click', (e) => {
          e.preventDefault();
          playCall(m.callId, m.nick, m.channel, div, m.pos, m.txDuration);
        });
        controls.appendChild(play);
        const listen = document.createElement('a');
        listen.className = 'voice-listen';
        listen.textContent = dur || 'listen';
        listen.href = '#';
        listen.addEventListener('click', (e) => {
          e.preventDefault();
          playCall(m.callId, m.nick, m.channel, div, m.pos, m.txDuration);
        });
        controls.appendChild(listen);
        body.appendChild(controls);
      } else {
        // No transcription yet — show play button only
        const play = document.createElement('span');
        play.className = 'voice-play';
        play.textContent = '▶';
        play.addEventListener('click', (e) => {
          e.preventDefault();
          playCall(m.callId, m.nick, m.channel, div, m.pos, m.txDuration);
        });
        body.appendChild(play);

        if (dur) {
          const durSpan = document.createElement('span');
          durSpan.className = 'voice-dur';
          durSpan.textContent = ' ' + dur + ' ';
          body.appendChild(durSpan);
        }

        const listen = document.createElement('a');
        listen.className = 'voice-listen';
        listen.textContent = 'listen';
        listen.href = '#';
        listen.addEventListener('click', (e) => {
          e.preventDefault();
          playCall(m.callId, m.nick, m.channel, div, m.pos, m.txDuration);
        });
        body.appendChild(listen);
      }

      div.innerHTML = nickHtml;
      div.appendChild(body);
    } else {
      div.innerHTML = nickHtml + `<span class="body">${esc(m.text)}</span>`;
    }
  }

  if (m.callId) div.dataset.callId = m.callId;

  // Wire up origin tag click to switch to source channel
  const originEl = div.querySelector('.origin-tag');
  if (originEl) {
    originEl.addEventListener('click', (e) => {
      e.stopPropagation();
      const ch = originEl.dataset.channel;
      if (ch && channels.has(ch)) switchChannel(ch);
    });
  }

  return div;
}

function appendMsgDOM(m) {
  // Date separator between days (local midnight boundaries)
  const msgDate = m.date || new Date();
  const dateStr = `${msgDate.getFullYear()}-${msgDate.getMonth()}-${msgDate.getDate()}`;
  if (lastRenderedDateStr && dateStr !== lastRenderedDateStr) {
    const sep = document.createElement('div');
    sep.className = 'date-separator';
    sep.textContent = formatDateSeparator(msgDate);
    messagesEl.appendChild(sep);
  }
  lastRenderedDateStr = dateStr;

  const div = buildMsgEl(m);

  // Call grouping: if consecutive messages share the same callId, bracket them
  if (m.callId) {
    const prev = messagesEl.lastElementChild;
    if (prev && prev.dataset.callId === String(m.callId)) {
      // Previous message is part of the same call
      if (prev.classList.contains('call-group-last')) {
        prev.classList.replace('call-group-last', 'call-group-mid');
      } else if (!prev.classList.contains('call-group-first') && !prev.classList.contains('call-group-mid')) {
        prev.classList.add('call-group-first');
      }
      div.classList.add('call-group-last');
    }
  }

  m._el = div;
  messagesEl.appendChild(div);
}

/** Re-render a single message's DOM element in place (preserves call-group classes and scroll). */
function refreshMsgEl(m) {
  const oldEl = m._el;
  if (!oldEl || !oldEl.parentNode) return;

  const div = buildMsgEl(m);

  // Preserve call-group classes from the old element
  for (const cls of ['call-group-first', 'call-group-mid', 'call-group-last']) {
    if (oldEl.classList.contains(cls)) div.classList.add(cls);
  }

  oldEl.replaceWith(div);
  m._el = div;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function serverMsg(text) {
  addMsg(STATUS_CHANNEL, { ts: ts(), kind: 'notice', text });
}

function serverMsgTo(channel, text) {
  addMsg(channel, { ts: ts(), kind: 'notice', text });
}
